services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: testkitchen
      POSTGRES_USER: testkitchen
      POSTGRES_PASSWORD: testkitchen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testkitchen"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://testkitchen:testkitchen@db:5432/testkitchen?schema=public"
      SESSION_SECRET: "${SESSION_SECRET}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  postgres_data:
  uploads:
